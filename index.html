<script>

const qs = id => document.getElementById(id);

const scoreEl = qs('score');
const hsEl = qs('hs');
const streakEl = qs('streak');
const finalHsEl = qs('final-hs');
const finalScoreEl = qs('final-score');

const landingScreen = qs('landing-screen');
const gameOverScreen = qs('game-over-screen');
const loadingScreen = qs('loading-screen');
const gameWrap = qs('game-wrap');
const playBtn = qs('play-button');

const canvas = qs('gameCanvas');
const ctx = canvas.getContext('2d');

let score = 0;
let streak = 0;
let highScore = 0;

hsEl.innerText = highScore;

let theme = {};

function updateColors() {

const style = getComputedStyle(document.body);

theme = {

pillar: style.getPropertyValue('--pillar-color'),
hero: style.getPropertyValue('--hero-color'),
stick: style.getPropertyValue('--stick-color'),
scarf: style.getPropertyValue('--scarf-color'),
perfect: style.getPropertyValue('--perfect-color'),
text: style.getPropertyValue('--text-color'),
button: style.getPropertyValue('--button-bg')

};

}

updateColors();

let phase = "waiting";

let stickLen = 0;
let stickAng = -90;
let fallVel = 0;

let heroX = 0;
let heroY = 0;

let pillars = [];

let particles = [];
let floatTexts = [];

let camX = 0;
let animId;

const w = canvas.width = 400;
const h = canvas.height = 600;

const pHeight = 250;
const hSize = 20;
const pZone = 12;
const maxStick = 330;

function spawnText(x,y,text,color){

floatTexts.push({

x:x,
y:y,
txt:text,
col:color,
life:1

});

}

function updateStreakUI(){

streakEl.innerText = streak;

if(streak>0){

streakEl.classList.add("streak-active");

}else{

streakEl.classList.remove("streak-active");

}

}

function initGame(){

score=0;
streak=0;

scoreEl.innerText=score;

updateStreakUI();

phase="waiting";

camX=0;

stickLen=0;

stickAng=-90;

pillars=[

{ x:0 , w:80 },

{ x:180 , w:60 }

];

heroX=pillars[0].w-10;

heroY=h-pHeight;

cancelAnimationFrame(animId);

gameLoop();

}

window.addEventListener("load",()=>{

loadingScreen.classList.add("hidden");

landingScreen.classList.remove("hidden");

});

playBtn.onclick=()=>{

landingScreen.classList.add("hidden");

gameWrap.classList.add("visible");

initGame();

};

window.startGame=()=>{

gameOverScreen.classList.add("hidden");

initGame();

};

window.addEventListener("pointerdown",()=>{

if(phase==="waiting"){

phase="stretching";

stickLen=0;

}

});

window.addEventListener("pointerup",()=>{

if(phase==="stretching"){

phase="falling";

}

});

function update(){

if(phase==="stretching"){

stickLen+=3;

if(stickLen>maxStick){

phase="falling";

}

}

else if(phase==="falling"){

stickAng+=5;

if(stickAng>=0){

stickAng=0;

phase="walking";

}

}

else if(phase==="walking"){

heroX+=4;

let tip=pillars[0].x+pillars[0].w+stickLen;

let next=pillars[1];

if(tip>=next.x && tip<=next.x+next.w){

if(heroX>=next.x+next.w-10){

score++;

scoreEl.innerText=score;

phase="transition";

}

}else{

if(heroX>=tip){

phase="gameover";

endGame();

}

}

}

}

function endGame(){

if(score>highScore){

highScore=score;

}

finalScoreEl.innerText=score;

finalHsEl.innerText=highScore;

hsEl.innerText=highScore;

gameOverScreen.classList.remove("hidden");

}

function draw(){

ctx.clearRect(0,0,w,h);

pillars.forEach(p=>{

ctx.fillStyle=theme.pillar;

ctx.fillRect(p.x,h-pHeight,p.w,pHeight);

});

ctx.save();

ctx.translate(pillars[0].x+pillars[0].w,h-pHeight);

ctx.rotate(stickAng*Math.PI/180);

ctx.fillStyle=theme.stick;

ctx.fillRect(0,-4,stickLen,4);

ctx.restore();

ctx.fillStyle=theme.hero;

ctx.beginPath();

ctx.arc(heroX,heroY-10,6,0,Math.PI*2);

ctx.fill();

}

function gameLoop(){

update();

draw();

animId=requestAnimationFrame(gameLoop);

}

</script>
