<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stickman Bridge</title>

<style>

body{

margin:0;
background:#1a1c2c;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
font-family:sans-serif;

}

#loading-screen{

position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:5;

}

.hidden{

display:none;

}

.game-container{

display:none;

}

.visible{

display:block;

}

canvas{

background:#111;
border-radius:20px;

}

button{

padding:15px 40px;
font-size:18px;
border:none;
border-radius:40px;
cursor:pointer;

}

</style>

</head>

<body>

<div id="loading-screen">

Loading...

</div>


<div id="landing-screen" class="hidden">

<center>

<h1>Stickman Bridge</h1>

<button id="play-button">PLAY</button>

</center>

</div>


<div class="game-container" id="game-wrap">

<center>

<canvas id="gameCanvas"></canvas>

</center>

</div>


<script>

const loadingScreen=document.getElementById("loading-screen");
const landing=document.getElementById("landing-screen");
const playBtn=document.getElementById("play-button");
const gameWrap=document.getElementById("game-wrap");

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

canvas.width=400;
canvas.height=600;

let phase="waiting";
let stickLen=0;
let stickAng=-90;

let heroX=70;
let heroY=350;

let pillars=[

{x:0,w:80},
{x:200,w:60}

];

window.onload=()=>{

loadingScreen.classList.add("hidden");
landing.classList.remove("hidden");

};

playBtn.onclick=()=>{

landing.classList.add("hidden");
gameWrap.classList.add("visible");

gameLoop();

};

window.addEventListener("pointerdown",()=>{

if(phase==="waiting"){

phase="stretching";
stickLen=0;

}

});

window.addEventListener("pointerup",()=>{

if(phase==="stretching"){

phase="falling";

}

});

function update(){

if(phase==="stretching"){

stickLen+=4;

}

else if(phase==="falling"){

stickAng+=5;

if(stickAng>=0){

stickAng=0;
phase="walking";

}

}

else if(phase==="walking"){

heroX+=3;

}

}

function draw(){

ctx.clearRect(0,0,400,600);

pillars.forEach(p=>{

ctx.fillStyle="#444";
ctx.fillRect(p.x,350,p.w,250);

});

ctx.save();

ctx.translate(pillars[0].x+pillars[0].w,350);

ctx.rotate(stickAng*Math.PI/180);

ctx.fillStyle="yellow";

ctx.fillRect(0,-4,stickLen,4);

ctx.restore();

ctx.beginPath();

ctx.arc(heroX,heroY,6,0,Math.PI*2);

ctx.fillStyle="white";

ctx.fill();

}

function gameLoop(){

update();
draw();

requestAnimationFrame(gameLoop);

}

</script>

</body>
</html>
